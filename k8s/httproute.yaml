apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pronunt-ai-service
  namespace: pronunt-app-ns
spec:
  parentRefs:
    - name: pronunt-gateway
      namespace: pronunt-gateway-ns
  hostnames:
    - pronunt.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/ai
      backendRefs:
        - name: pronunt-ai-service
          port: 8000
